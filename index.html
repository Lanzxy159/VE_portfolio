<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topherculous</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div><b>Topherculous</b></div>
    <div class="nav-links">
      <a href="#hero">Home</a>
      <a href="#portfolio">Portfolio</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

  <!-- HERO -->
   <section class="hero" id="hero">
    <!-- LEFT CONTENT -->
    <div class="hero-content">
        <h1>Loren ispum</h1>
        <p>blablablabalbalbalbalab</p>

        <button class="btn" id="watchBtn">
        Play with sound
        </button>
    </div>

    <!-- RIGHT VIDEO -->
    <div class="hero-video">
        <div class="video-wrapper">
        <iframe
            id="heroVideo"
            src="https://www.youtube.com/embed/9lkXgkwCapk?autoplay=1&mute=1&controls=0&rel=0&playsinline=1"
            allow="autoplay; encrypted-media"
            frameborder="0"
            allowfullscreen>
        </iframe>
        </div>
    </div>
   </section>

    


  <!-- Portfolio -->
   <div class="filter-bar">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="golf">Golf</button>
    <button class="filter" data-filter="realestate">Real Estate</button>
    <button class="filter" data-filter="ads">Ads</button>
   </div>
  

  
  <section class="row" id="portfolio">
    <h2>My Works</h2>
    <div class="row-container">
        <div class="card" data-video="rrh9qP287ek" data-type="youtube" data-category="golf">
            <img src="https://img.youtube.com/vi/rrh9qP287ek/hqdefault.jpg" />
            <div class="overlay">Test Video 1</div>
        </div>

        <div class="card" data-video="-Nf0zbF3ELQ" data-type="youtube" data-category="realestate">
            <img src="https://img.youtube.com/vi/-Nf0zbF3ELQ/hqdefault.jpg" />
            <div class="overlay">Test Video 2</div>
        </div>

        <div class="card" data-video="1tL6ZU1DDa4toK1ZOHRK_K8Y5b_DvvB28" data-type="drive" data-category="realestate">
            <img src="" />
            <div class="overlay">Test Video 3</div>
        </div>



    </div>




  </section>
    <div id="videoModal" class="video-modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <iframe id="modalVideo" allow="autoplay" allowfullscreen></iframe>
      </div>
    </div>
    


  <!-- ABOUT -->
  <section class="about" id="about">
    <h2>About</h2>
    <p>I create cinematic edits that help brands stand out and attract clients.</p>

    
  </section>

  <!-- CONTACT -->
  <section class="contact" id="contact">
    <h2>Contacts</h2>
    <p>Topherculous details blabbalbla</p>
    <a href="#">Chris@email.com</a>
  </section>

    <div id="yt-container">
        <iframe id="ytPlayer"
            frameborder="0"
            allow="autoplay"
            allowfullscreen>
        </iframe>
    </div>
    

  <script src="script.js"></script>
</div>
</body>
</html>
